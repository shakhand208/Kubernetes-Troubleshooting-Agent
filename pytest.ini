[pytest]
# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings
    --color=yes

# Async support
asyncio_mode = auto

# Timeout for tests (seconds)
timeout = 300

# Markers for test organization
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (with mock services)
    api: API endpoint tests
    signal: Signal collection tests
    auth: Authentication tests
    security: Security and authorization tests
    performance: Performance and load tests
    slow: Slow running tests
    flaky: Flaky tests (may fail intermittently)
    regression: Regression tests
    smoke: Smoke/sanity tests
    requires_cluster: Requires live Kubernetes cluster
    requires_azure: Requires Azure authentication
    edge_case: Edge case and error handling tests
    ui: UI/Frontend tests
    websocket: WebSocket tests

# Test collection ignore patterns
norecursedirs = 
    .git
    .venv
    venv
    dist
    build
    *.egg
    __pycache__
    .pytest_cache

# Minimum Python version
minversion = 7.0

# Coverage options (used with --cov)
[coverage:run]
source = app
omit = 
    */tests/*
    */venv/*
    */__main__.py
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    if typing.TYPE_CHECKING:
    class .*\(Protocol\):
    @abstractmethod
    @abc.abstractmethod
    @property
    
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov

[coverage:json]
output = coverage.json
pretty_print = True
